<div class="justify-center flex p-4 px-8 bg-[#252934] text-white items-center space-x-6">
    <button class="hover:text-[#E31B6D]" [ngClass]="containerService.currentPage == 0 ? 'text-[#E31B6D]':'text-white'" (click)="openHome()">Home</button>
    <button class="hover:text-[#E31B6D]" (click)="openAbout()" [ngClass]="containerService.currentPage == 1 ? 'text-[#E31B6D]':'text-white'">About</button>
    <button class="hover:text-[#E31B6D]" (click)="openSkills()" [ngClass]="containerService.currentPage == 2 ? 'text-[#E31B6D]':'text-white'">Skills</button>
    <button class="hover:text-[#E31B6D]" (click)="openProjects()" [ngClass]="containerService.currentPage == 3 ? 'text-[#E31B6D]':'text-white'">Projects</button>
    <button class="hover:text-[#E31B6D]" (click)="openContactInfo()" [ngClass]="containerService.currentPage == 4 ? 'text-[#E31B6D]':'text-white'">Contact</button>
</div>
