<div class="md:justify-center sm:justify-start flex flex-wrap p-4 bg-[#252934] text-white items-center left-0">
    <!-- Menu for desktop view -->
    <div class="hidden md:flex gap-x-6">
        <button class="hover:text-[#E31B6D]" [ngClass]="containerService.currentPage == 0 ? 'text-[#E31B6D]':'text-white'" (click)="openHome()">Home</button>
        <button class="hover:text-[#E31B6D]" (click)="openAbout()" [ngClass]="containerService.currentPage == 1 ? 'text-[#E31B6D]':'text-white'">About</button>
        <button class="hover:text-[#E31B6D]" (click)="openSkills()" [ngClass]="containerService.currentPage == 2 ? 'text-[#E31B6D]':'text-white'">Skills</button>
        <button class="hover:text-[#E31B6D]" (click)="openProjects()" [ngClass]="containerService.currentPage == 3 ? 'text-[#E31B6D]':'text-white'">Projects</button>
        <button class="hover:text-[#E31B6D]" (click)="openContactInfo()" [ngClass]="containerService.currentPage == 4 ? 'text-[#E31B6D]':'text-white'">Contact</button>
    </div>
    
    <!-- Mobile menu button (hamburger icon) -->
    <div class="justify-start flex items-start md:hidden sm:hidden gap-x-3">
        <button (click)="toggleMobileMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <h3 class="md:text-xl text-white font-bold">{{sectionName}}</h3>
    </div>

    <!-- Mobile menu -->
    <div *ngIf="isMobileMenuOpen" class="fixed top-0 left-0 w-64 h-full flex flex-col bg-[#252934] text-white p-6 space-y-4 md:hidden z-50 text-left transform transition-transform duration-300 ease-in-out">
        <!-- Close button -->
        <div class="flex justify-end">
            <button (click)="toggleMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <button class="hover:text-[#E31B6D] w-full" [ngClass]="containerService.currentPage == 0 ? 'text-[#E31B6D]':'text-white'" (click)="openHome()">Home</button>
        <button class="hover:text-[#E31B6D] w-full" (click)="openAbout()" [ngClass]="containerService.currentPage == 1 ? 'text-[#E31B6D]':'text-white'">About</button>
        <button class="hover:text-[#E31B6D] w-full" (click)="openSkills()" [ngClass]="containerService.currentPage == 2 ? 'text-[#E31B6D]':'text-white'">Skills</button>
        <button class="hover:text-[#E31B6D] w-full" (click)="openProjects()" [ngClass]="containerService.currentPage == 3 ? 'text-[#E31B6D]':'text-white'">Projects</button>
        <button class="hover:text-[#E31B6D] w-full" (click)="openContactInfo()" [ngClass]="containerService.currentPage == 4 ? 'text-[#E31B6D]':'text-white'">Contact</button>
    </div>
</div>
